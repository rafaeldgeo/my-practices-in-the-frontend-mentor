<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="public/images/favicon-32x32.png"
    />
    <title>Frontend Mentor | Interactive pricing component</title>
    <link rel="stylesheet" href="public/css/style.css" />
    <script type="module" src="src/js/main.js"></script>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1 class="header__title">Simple, traffic-based pricing</h1>
        <p class="header__msg">
          Sign-up for our 30-day trial. No credit card required.
        </p>
      </header>
      <main class="main">
        <section class="price-group">
          <div class="price-group__setup">
            <span class="price-group__pageviews" id="pageviews-value"
              >100K pageviews</span
            >
            <div class="price-group__price-wrapper">
              <strong class="price-group__price">$16.00</strong>
              <span class="price-group__period">/month</span>
            </div>
            <div class="pageviews-slider">
              <label class="sr-only" for="pageviews">Pageviews amount</label>
              <input
                class="pageviews-slider__range"
                type="range"
                name="pageviews"
                id="pageviews"
                min="0"
                max="4"
                aria-describedby="pageviews-value"
              />
            </div>
            <fieldset class="billing">
              <legend class="sr-only">Billing period</legend>

              <label class="billing__label">
                <input
                  class="billing__radio"
                  type="radio"
                  name="billing"
                  value="monthly"
                  checked
                />
                Monthly Billing
              </label>

              <label class="billing__label">
                <input
                  class="billing__radio"
                  type="radio"
                  name="billing"
                  value="yearly"
                />
                Yearly Billing
                <span class="billing__discount">25% discount</span>
              </label>
            </fieldset>
          </div>
          <div class="price-group__info">
            <ul class="price-group__list-benefits">
              <li>
                <img
                  src="public/images/icon-check.svg"
                  alt=""
                  width="9"
                  height="8"
                />Unlimited websites
              </li>
              <li>
                <img
                  src="public/images/icon-check.svg"
                  alt=""
                  width="9"
                  height="8"
                />100% data ownership
              </li>
              <li>
                <img
                  src="public/images/icon-check.svg"
                  alt=""
                  width="9"
                  height="8"
                />Email reports
              </li>
            </ul>
            <div class="button-wrapper">
              <button type="button">Start my trial</button>
            </div>
          </div>
        </section>
      </main>
      <footer class="footer">
        Challenge by
        <a
          class="footer__link"
          href="https://www.frontendmentor.io/profile/rafaeldgeo"
          target="_blank"
          rel="noopener noreferrer"
          >Frontend Mentor</a
        >. Coded by
        <a
          class="footer__link"
          href="https://www.linkedin.com/in/rafaeldgeo/"
          target="_blank"
          rel="noopener noreferrer"
          >Rafael Dias de Almeida</a
        >.
      </footer>
    </div>
  </body>
</html>
