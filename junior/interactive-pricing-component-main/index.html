<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="public/images/favicon-32x32.png"
    />
    <title>Frontend Mentor | Interactive pricing component</title>
    <link rel="stylesheet" href="public/css/style.css" />
    <script type="module" src="src/js/main.js"></script>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1 class="header__title">Simple, traffic-based pricing</h1>
        <p class="header__msg">
          Sign-up for our 30-day trial. No credit card required.
        </p>
      </header>
      <main class="main">
        <section class="price-group">
          <div class="price-group__header" aria-live="polite">
            <span class="price-group__pageviews" id="pageviews-value">100K pageviews</span>
            <span class="price-group__price-value">$16.00 /month</span>
          </div>
          <div class="price-group__body">
            <label class="sr-only" for="pageviews">Pageviews amount</label>
            <input
              class="price-group__pageviews-slider"
              type="range"
              name="pageviews"
              id="pageviews"
              min="0"
              max="4"
              aria-describedby="pageviews-value"
            />

            <fieldset class="price-group__billing">
              <legend class="sr-only">Billing period</legend>

              <label>
                <input type="radio" name="billing" value="monthly" checked />
                Monthly Billing
              </label>

              <label>
                <input type="radio" name="billing" value="yearly" />
                Yearly Billing
                <span class="price-group__option--discount">25% discount</span>
              </label>
            </fieldset>
          </div>
          <div class="price-group__footer">
            <ul class="price-group__list-benefits">
              <li>
                <img
                  src="public/images/icon-check.svg"
                  alt=""
                  width="9"
                  height="8"
                />Unlimited websites
              </li>
              <li>
                <img
                  src="public/images/icon-check.svg"
                  alt=""
                  width="9"
                  height="8"
                />100% data ownership
              </li>
              <li>
                <img
                  src="public/images/icon-check.svg"
                  alt=""
                  width="9"
                  height="8"
                />Email reports
              </li>
            </ul>
            <div class="button-wrapper">
              <button type="button">Start my trial</button>
            </div>
          </div>
        </section>
      </main>
      <footer class="footer">
        Challenge by
        <a
          class="footer__link"
          href="https://www.frontendmentor.io/profile/rafaeldgeo"
          target="_blank"
          rel="noopener noreferrer"
          >Frontend Mentor</a
        >. Coded by
        <a
          class="footer__link"
          href="https://www.linkedin.com/in/rafaeldgeo/"
          target="_blank"
          rel="noopener noreferrer"
          >Rafael Dias de Almeida</a
        >.
      </footer>
    </div>
  </body>
</html>
